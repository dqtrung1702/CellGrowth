{% extends "base.html" %}

{% block content %}
  <div class="container-fluid" style="max-width: 1400px;" data-uaa-url="{{ uaa_url|default('') }}">
    <div class="alert alert-light d-flex justify-content-between align-items-center" id="health-card" style="border:1px solid #eee;border-radius:8px;">
      <div>
        <strong>Status:</strong> <span id="health-status">...</span> |
        <strong>Uptime:</strong> <span id="health-uptime">...</span>
      </div>
      <button class="btn btn-sm btn-outline-primary" id="health-refresh">Refresh</button>
    </div>
    <h2>Tài liệu</h2>
    <p style="margin: 0.3em 0 1em; color:#666;">Chọn tài liệu để xem:</p>
    <div class="list-group" style="margin-bottom:16px;">
      <a class="list-group-item list-group-item-action" target="_blank"
         href="{{ url_for('static', filename='docs-proxy/uaa-business.html') }}">UAA Business Flow</a>
      <a class="list-group-item list-group-item-action" target="_blank"
         href="{{ url_for('static', filename='docs-proxy/architecture-diagrams.html') }}">Architecture Diagrams</a>
      <a class="list-group-item list-group-item-action" target="_blank"
         href="{{ url_for('static', filename='docs-proxy/review.html') }}">Project Review</a>
    </div>
  </div>
{% endblock %}
