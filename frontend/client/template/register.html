{% extends "base.html" %}
{% block content %}
<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<div class="container auth-grid">
    <div class="auth-illustration">
        <img src="/static/images/login.jfif" alt="Register" height="350">
    </div>

    <div class="auth-form">
        <h2>Đăng ký</h2>
        <p>Tạo tài khoản mới để bắt đầu.</p>
        <form method="post">
            <div class="input-group">
                <input type="text" placeholder="Username" name="username" value="{{request.form.username }}">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" name="password" value="{{request.form.password }}">
            </div>
            <div class="input-group">
                <input type="text" placeholder="NameDisplay" name="namedisplay" value="{{request.form.namedisplay }}">
            </div>
            <div class="input-group">
                <input type="submit" value="Register">
            </div>
        </form>
        {% if error %}
        <p class="auth-error"><strong>Error:</strong> {{ error }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
