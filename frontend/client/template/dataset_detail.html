{% extends "base.html" %}
{% block content %}
<div class="container col-full">
  <div>
    <i class="fa fa-arrow-circle-left" onclick="window.location.href='{{ url_for('dataset_blueprint.datasets') }}'"> Back to Data Sets</i>
  </div>
  <h2>Dataset Detail</h2>
  <form id="DatasetDetailForm" method="POST" action="{{ url_for('dataset_blueprint.dataset_detail') }}">
    <input type="hidden" name="SetId" value="{{ SetId }}">
    <div class="input-group">
      <label><i class="fa fa-tag"> SetName</i></label>
      <input type="text" value="{{ set_info.get('SetName','') }}" disabled>
    </div>
    <div class="input-group">
      <label><i class="fa fa-cogs"> Services</i></label>
      <input type="text" value="{{ set_info.get('Services','') }}" disabled>
    </div>
    <div class="input-group">
      <label><i class="fa fa-key"> SetCode</i></label>
      <input type="text" value="{{ set_info.get('SetCode','') }}" disabled>
    </div>

    <div class="input-group data-rows-block">
      <label><i class="fa fa-table"> Data rows</i></label>
      <div class="table-wrapper">
        <table id="DataTable" class="table sortable">
          <thead>
            <tr>
              <th class="table__heading">STT</th>
              <th class="table__heading">Table</th>
              <th class="table__heading">Column</th>
              <th class="table__heading">Value</th>
              <th class="table__heading"></th>
            </tr>
            <tr>
              <td class="table__searching"></td>
              <td class="table__searching"><input id="filterTable" type="text" placeholder="Filter table.." oninput="filterDataRows()" /></td>
              <td class="table__searching"><input id="filterColumn" type="text" placeholder="Filter column.." oninput="filterDataRows()" /></td>
              <td class="table__searching"><input id="filterValue" type="text" placeholder="Filter value.." oninput="filterDataRows()" /></td>
              <td class="table__searching"></td>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button type="button" class="btn" onclick="addDataRow()"><i class="fa fa-plus"></i> Add</button>
      </div>
    </div>

    <input type="hidden" id="DataJSON" name="DataJSON" />
    <div class="input-group">
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const datasets = {{ datasets | tojson }};
    renderDataTable(datasets || []);

    // Re-apply filter (and visible-row numbering) after a sort click.
    document.querySelectorAll('#DataTable thead th').forEach(th => {
      th.addEventListener('click', () => setTimeout(filterDataRows, 0));
    });

    document.getElementById("DatasetDetailForm").addEventListener('submit', function() {
      const rows = Array.from(document.querySelectorAll("#DataTable tbody tr"));
      const data = rows.map(tr => {
        const tds = tr.querySelectorAll("td");
        return {
          Table: (tds[1].innerText || '*').trim(),
          Column: (tds[2].innerText || '*').trim(),
          Value: (tds[3].innerText || '*').trim(),
        };
      }).filter(d => d.Table && d.Column && d.Value);
      document.getElementById("DataJSON").value = JSON.stringify(data);
      return true;
    });
  });

  function renderDataTable(list) {
    const tbody = document.querySelector("#DataTable tbody");
    tbody.innerHTML = "";
    list.forEach((d, idx) => appendDataRow(idx + 1, d.Table || '*', d.Column || '*', d.Value || '*'));
    if (!list.length) appendDataRow(1, '*', '*', '*');
    filterDataRows();
  }

  function appendDataRow(stt, table, column, value) {
    const tbody = document.querySelector("#DataTable tbody");
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="table__content">${stt}</td>
      <td class="table__content" contenteditable="true">${table}</td>
      <td class="table__content" contenteditable="true">${column}</td>
      <td class="table__content" contenteditable="true">${value}</td>
      <td class="table__content"><a href="#" onclick="deleteRow(this); return false;"><i class="fa fa-trash"></i></a></td>
    `;
    tbody.appendChild(tr);
  }

  function addDataRow() {
    const tbody = document.querySelector("#DataTable tbody");
    const stt = tbody.children.length + 1;
    appendDataRow(stt, '*', '*', '*');
    filterDataRows();
  }

  function deleteRow(anchor) {
    const row = anchor.closest("tr");
    row.remove();
    filterDataRows();
  }

  function filterDataRows() {
    const tableFilter = (document.getElementById('filterTable').value || '').toLowerCase();
    const columnFilter = (document.getElementById('filterColumn').value || '').toLowerCase();
    const valueFilter = (document.getElementById('filterValue').value || '').toLowerCase();

    const rows = Array.from(document.querySelectorAll('#DataTable tbody tr'));
    let counter = 1;
    rows.forEach(tr => {
      const tds = tr.querySelectorAll('td');
      const tableVal = (tds[1].innerText || '').toLowerCase();
      const columnVal = (tds[2].innerText || '').toLowerCase();
      const valueVal = (tds[3].innerText || '').toLowerCase();

      const visible = (!tableFilter || tableVal.includes(tableFilter)) &&
                      (!columnFilter || columnVal.includes(columnFilter)) &&
                      (!valueFilter || valueVal.includes(valueFilter));

      tr.style.display = visible ? '' : 'none';
      if (visible) {
        tds[0].innerText = counter;
        counter += 1;
      }
    });
  }
</script>
{% endblock %}
