{% extends "base.html" %}
{% block content %}
  <div class="container col-full">
    <div>              
      <i class="fa fa-arrow-circle-left" onclick="window.location.href='{{ url_for('permission_blueprint.Permission') }}'"> Back to Permissions screen</i>
    </div>
    <form id="PermissionForm" method="POST">
      <input type="hidden" name="id" value="{{ permission.get('id','New') }}">
      <div class="col-full">
        <h4>Permission Info</h4>
        <div class="input-group">
          <label for="PermissionName"><i class="fa fa-tag"> Permission Name</i></label>
          {% if permission.get('PermissionName') %} 
            <input id="PermissionName" type="text" disabled value="{{permission.get('PermissionName')}}"  placeholder="Permission Name" name="PermissionName"/>
          {% else %}
            <input id="PermissionName" type="text"  placeholder="Permission Name" name="PermissionName"/>
          {%endif%}
        </div>
        <div class="input-group">
          <label for="PermissionType"><i class="fa fa-flag"> Type</i></label>
          <select name="PermissionType" id="PermissionType">
            <option value="ROLE">ROLE</option>
            <option value="DATA">DATA</option>
          </select>
        </div>
        <div class="input-group">
          <label for="Description"><i class="fa fa-align-center"> Description</i></label>
          <input id="Description" type="text" value="{{permission.get('Description','')}}" placeholder="Description" name="Description" />
        </div>
        <div class="input-group scope-block">
          <div class="scope-label">
            <i class="fa fa-check-circle"></i>
            <span id="PermissionScopeLabel"> URLs / Pages</span>
          </div>
          <div class="table-wrapper" id="url-wrapper">
            <table id="UrlTable" class="table sortable">
              <thead>
                <tr>
                  <th class="table__heading">STT</th>
                  <th class="table__heading">Method</th>
                  <th class="table__heading">URL</th>
                  <th class="table__heading no-sort"></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <button type="button" class="btn" onclick="addUrlRow()"><i class="fa fa-plus"></i> Add URL</button>
          </div>

          <div class="table-wrapper" id="page-wrapper">
            <table id="PageTable" class="table sortable">
              <thead>
                <tr>
                  <th class="table__heading">STT</th>
                  <th class="table__heading">Page</th>
                  <th class="table__heading no-sort"></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <button type="button" class="btn" onclick="addPageRow()"><i class="fa fa-plus"></i> Add Page</button>
          </div>

          <div class="table-wrapper" id="data-wrapper" style="display:none;">
            <select id="DataSetSelect" class="set-select" name="DataSets" multiple style="width:100%"></select>
            <p style="margin: 6px 0;"><a href="{{ url_for('dataset_blueprint.datasets') }}">Data Sets</a></p>
          </div>
        </div>
        <div class="input-group">
          <div class="col-half">
            <label><i class="fa fa-user"> Last Update</i></label>
            <input type="text" disabled value="{{permission.get('LastUpdateDateTime','')}}" />
          </div>
          <div class="col-half">
            <label><i class="fa fa-user"> by</i></label>
            <input type="text" disabled value="{{permission.get('LastUpdateUserName','')}}" />
          </div>
        </div>
      </div>        
      <div class="col-half input-group">          
        <div class="col-half">
          <button type="submit"><i class="fa fa-save"> Save</i></button>
        </div>
        <div class="col-half">              
          <button type="button" onclick="window.location.href='{{ url_for('permission_blueprint.permission_detail', id = permission.get('id')) }}'"><i class="fa fa-undo"> Undo</i></button>
        </div>
      </div>        
      <input type="hidden" id="UrlListJSON" name="UrlListJSON" />
      <input type="hidden" id="DataSetsJSON" name="DataSetsJSON" />
    </form>
  </div>
  <script>
    $(document).ready(function(){
      const initialTypeRaw = "{{permission.get('PermissionType','ROLE')}}";
      const initialType = (initialTypeRaw === 'DATA') ? 'DATA' : 'ROLE';
      document.getElementById("PermissionType").value = initialType || 'ROLE';

      // nạp URL / Page list vào bảng
      const urlListRaw = {{ urlpermission | tojson }};
      const urlList = [];
      const pageList = [];
      (urlListRaw || []).forEach(u => {
        const type = (u.Type || u.type || 'ROLE').toUpperCase();
        const urlVal = u.url || u.URL || '';
        const pageVal = u.Page || u.page || '';
        if (type === 'PAGE') {
          pageList.push({
            ...u,
            Page: pageVal || urlVal,
            url: pageVal || urlVal,
            Type: 'PAGE'
          });
        } else {
          urlList.push({
            ...u,
            url: urlVal || pageVal,
            Method: u.Method || 'GET',
            Type: type || 'ROLE'
          });
        }
      });
      const setsList = {{ sets | tojson }};
      renderUrlTable(urlList || []);
      renderPageTable(pageList || []);

      // fallback: nếu không có dữ liệu từ server-side, gọi API getURLbyPermission
      const permId = "{{permission.get('id','')}}";
      if ((!urlListRaw || !urlListRaw.length) && permId) {
        $.ajax({
          type: "POST",
          url: "{{ url_for('permission_blueprint.getURLbyPermission') }}",
          data: JSON.stringify({ PermissionId: permId }),
          contentType: "application/json; charset=utf-8",
          dataType: "json",
          success: function(resp){
            try{
              const arr = Array.isArray(resp) ? resp : (resp || []);
              const urls = [], pages = [];
              arr.forEach(u=>{
                const type = (u.Type || u.type || 'ROLE').toUpperCase();
                const urlVal = u.url || u.URL || '';
                const pageVal = u.Page || u.page || u.URL || u.url || '';
                if (type === 'PAGE' || pageVal) {
                  pages.push({...u, Page: pageVal, url: pageVal, Type:'PAGE'});
                } else {
                  urls.push({...u, url: urlVal, Method: u.Method || 'GET', Type:'ROLE'});
                }
              });
              renderUrlTable(urls); renderPageTable(pages);
            } catch(e){}
          }
        });
      }

      // nạp DataSets (unique theo SetId) cho select
      const dataSets = {{ permission.get('DataSets', []) | tojson }};
      const selectedIds = [];
      const seen = new Set();
      (dataSets || []).forEach(s => {
        const key = s.SetId || `${s.SetName}::${s.Services}::${s.SetCode}`;
        if (!seen.has(key)) {
          seen.add(key);
          selectedIds.push(String(s.SetId || ''));
        }
      });
      const selectEl = document.getElementById("DataSetSelect");
      const options = setsList.map(s => {
        const label = s.SetName || '';
        const opt = new Option(label, s.SetId, false, selectedIds.includes(String(s.SetId)));
        opt.dataset.setname = s.SetName || '';
        opt.dataset.services = s.Services || '';
        opt.dataset.setcode = s.SetCode || '';
        return opt;
      });
      options.forEach(o => selectEl.appendChild(o));
      $(".set-select").select2({width:"100%"});

      toggleTables();

      $("#PermissionType").on('change', function(){
        toggleTables();
      });

      $("#PermissionForm").submit(function() {
        const type = document.getElementById("PermissionType").value || 'ROLE';
        if (type === 'DATA') {
          const select = document.querySelector(".set-select");
          const scopes = Array.from(select ? select.selectedOptions : []).map(opt => ({
            SetId: opt.value
          })).filter(s => s.SetId);
          document.getElementById("DataSetsJSON").value = JSON.stringify(scopes);
          document.getElementById("UrlListJSON").value = "[]";
        } else {
          const rows = Array.from(document.querySelectorAll("#UrlTable tbody tr"));
          const urls = rows.map(tr => {
            const cells = tr.querySelectorAll("td");
            return {
              Method: (cells[1].innerText || 'GET').trim(),
              url: (cells[2].innerText || '').trim(),
              Type: 'ROLE'
            };
          }).filter(u => u.url);
          const pageRows = Array.from(document.querySelectorAll("#PageTable tbody tr"));
          const pages = pageRows.map(tr => {
            const cells = tr.querySelectorAll("td");
            const pageVal = (cells[1].innerText || '').trim();
            return {
              Method: 'GET',
              url: pageVal,   // compatibility
              Page: pageVal,  // explicit page column
              Type: 'PAGE'
            };
          }).filter(u => u.url);
          const merged = [...urls, ...pages];
          document.getElementById("UrlListJSON").value = JSON.stringify(merged);
          document.getElementById("DataSetsJSON").value = "[]";
        }
        return true;
      });
    });

    function toggleTables(){
      const type = document.getElementById("PermissionType").value || 'ROLE';
      const isData = (type === 'DATA');
      const scopeLabel = document.getElementById("PermissionScopeLabel");
      if (scopeLabel) {
        scopeLabel.textContent = isData ? "Data Scopes" : "URLs / Pages";
      }
      document.getElementById("url-wrapper").style.display = isData ? 'none' : 'block';
      document.getElementById("page-wrapper").style.display = isData ? 'none' : 'block';
      document.getElementById("data-wrapper").style.display = isData ? 'block' : 'none';
      const urlTbody = document.querySelector("#UrlTable tbody");
      const pageTbody = document.querySelector("#PageTable tbody");
      if (!isData && urlTbody && urlTbody.children.length === 0) {
        appendUrlRow(1, 'GET', '', 'ROLE');
      }
      if (!isData && pageTbody && pageTbody.children.length === 0) {
        appendPageRow(1, 'GET', '', 'PAGE');
      }
    }

    function renderUrlTable(list) {
      const tbody = document.querySelector("#UrlTable tbody");
      tbody.innerHTML = "";
      list.forEach((u, idx) => appendUrlRow(idx + 1, u.Method || 'GET', u.url || '', 'ROLE'));
      if (!list.length) appendUrlRow(1, 'GET', '', 'ROLE');
    }

    function appendUrlRow(stt, method, url, type) {
      const tbody = document.querySelector("#UrlTable tbody");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="table__content">${stt}</td>
        <td class="table__content" contenteditable="true">${method}</td>
        <td class="table__content" contenteditable="true">${url}</td>
        <td class="table__content"><a href="#" onclick="deleteRow(this); return false;"><i class="fa fa-trash"></i></a></td>
      `;
      tbody.appendChild(tr);
    }

    function addUrlRow() {
      const tbody = document.querySelector("#UrlTable tbody");
      const stt = tbody.children.length + 1;
      appendUrlRow(stt, 'GET', '', 'ROLE');
    }

    function renderPageTable(list) {
      const tbody = document.querySelector("#PageTable tbody");
      tbody.innerHTML = "";
      list.forEach((u, idx) => appendPageRow(idx + 1, u.Method || 'GET', u.Page || u.url || '', u.Type || 'PAGE'));
      if (!list.length) appendPageRow(1, 'GET', '', 'PAGE');
    }

    function appendPageRow(stt, method, page, type) {
      const tbody = document.querySelector("#PageTable tbody");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="table__content">${stt}</td>
        <td class="table__content" contenteditable="true">${page}</td>
        <td class="table__content"><a href="#" onclick="deleteRow(this); return false;"><i class="fa fa-trash"></i></a></td>
      `;
      tbody.appendChild(tr);
    }

    function addPageRow() {
      const tbody = document.querySelector("#PageTable tbody");
      const stt = tbody.children.length + 1;
      appendPageRow(stt, 'GET', '', 'PAGE');
    }

    function addDataRow() {} // not used for DATA mode (multi-select handled directly)
    function deleteRow(anchor) {
      const row = anchor.closest("tr");
      const tbody = row && row.parentElement;
      if (!tbody) return;
      row.remove();
      // renumber STT
      Array.from(tbody.querySelectorAll("tr")).forEach((tr, idx) => {
        const first = tr.querySelector("td");
        if (first) first.textContent = idx + 1;
      });
      // ensure at least one empty row remains for editing
      if (!tbody.children.length) {
        const table = tbody.closest("table");
        const tableId = table ? table.id : '';
        if (tableId === 'PageTable') {
          appendPageRow(1, 'GET', '', 'PAGE');
        } else {
          appendUrlRow(1, 'GET', '', 'ROLE');
        }
      }
    }
    $(function(){ $(".set-select").select2({width:"100%"}); });
  </script>  
{% endblock %}
