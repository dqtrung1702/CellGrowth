version: "3.8"
services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DB:-dev}
      # App-specific vars consumed by init scripts
      MONGO_APP_DB: ${MONGO_APP_DB:-dev}
    volumes:
      - ./data:/data/db
      - ./init:/docker-entrypoint-initdb.d:ro
